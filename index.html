<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spielrundenergebnisse 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; background: #315d3a; font-family: 'DM Sans', sans-serif; color: #fff; }
.hdr { background: #315d3a; padding: 16px 28px 14px; }
.col-hdr { background: #315d3a; display: flex; align-items: center; padding: 6px 28px; border-top: 1px solid rgba(255,255,255,.15); border-bottom: 1px solid rgba(255,255,255,.15); }
.foot { background: #315d3a; padding: 11px 28px; border-top: 1px solid rgba(255,255,255,.15); }
.prow.r1 { background: #315d3a; }
.prow.r2 { background: #4f955d; }
.hdr-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
.title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: .04em; color: #fff; line-height: 1; }
.subtitle { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: .04em; color: #fff; line-height: 1; text-align: right; flex-shrink: 0; }
.hdr-row2 { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.count { font-size: 12px; color: rgba(255,255,255,.55); }
.sync-status { font-size: 11px; color: rgba(255,255,255,.5); margin-left: 4px; }
.sync-status.ok { color: #a8e6b8; }
.sync-status.err { color: #ffaaaa; }
.abtn { height: 30px; padding: 0 13px; border: 1px solid rgba(255,255,255,.45); border-radius: 6px; background: rgba(255,255,255,.1); color: #fff; font-size: 12px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: background .15s; }
.abtn:hover { background: rgba(255,255,255,.22); }
.abtn:disabled { opacity: .5; cursor: default; }
.ch { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.55); }
.prow { display: flex; align-items: center; padding: 7px 28px; gap: 10px; border-bottom: 1px solid rgba(0,0,0,.1); }
.prow:last-child { border-bottom: none; }
.p-nr { display: none; }
.p-name { width: 80px; flex-shrink: 0; height: 26px; background: transparent; border: none; border-bottom: 1.5px solid rgba(255,255,255,.5); color: #fff; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; padding: 0 3px; outline: none; position: sticky; left: 28px; z-index: 2; }
.prow.r1 .p-name { background: #315d3a; }
.prow.r2 .p-name { background: #4f955d; }
.p-name::placeholder { color: rgba(255,255,255,.3); }
.p-name:focus { border-bottom-color: #fff; }
.scores { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.scores::-webkit-scrollbar { display: none; }
.score-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 28px; background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.7); border-radius: 5px; flex-shrink: 0; }
.score-wrap:focus-within { border-color: #fff; background: rgba(255,255,255,.2); }
.sbox { width: 36px; height: 26px; background: transparent; border: none; color: #fff; font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif; text-align: center; padding: 0; margin: 0; outline: none; -moz-appearance: textfield; -webkit-appearance: none; appearance: none; }
.sbox::-webkit-outer-spin-button, .sbox::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.sbox::placeholder { color: rgba(255,255,255,.3); font-size: 10px; }
.type-badge { position: absolute; top: 0px; right: 0px; width: 10px; height: 10px; border-radius: 50%; font-size: 6px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; visibility: hidden; z-index: 2; }
.type-badge.tb-P, .type-badge.tb-T, .type-badge.tb-L { visibility: visible; }
.type-badge.tb-P { background: #7ec8e3; color: #0a3d52; }
.type-badge.tb-T { background: #f5c842; color: #5a3d00; }
.type-badge.tb-L { background: #f4a0c0; color: #6b002e; }
.score-tooltip { visibility: hidden; opacity: 0; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #1a3d22; border: 1px solid rgba(255,255,255,.35); border-radius: 5px; padding: 5px 8px; white-space: nowrap; z-index: 100; pointer-events: auto; cursor: pointer; transition: opacity .15s; font-size: 9px; font-weight: 600; line-height: 1.6; text-align: left; }
.score-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: rgba(255,255,255,.35); }
.score-wrap:hover .score-tooltip { visibility: visible; opacity: 1; }
.score-wrap:has(.sdel:hover) .score-tooltip { visibility: hidden !important; opacity: 0 !important; }
.sdel { position: absolute; bottom: -4px; right: -4px; width: 10px; height: 10px; border-radius: 50%; background: rgba(200,50,50,.85); color: #fff; font-size: 7px; display: none; align-items: center; justify-content: center; cursor: pointer; line-height: 1; z-index: 10000; }
.score-wrap:hover .sdel { display: flex; }
.meta-popup { position: fixed; background: #1a3d22; border: 1.5px solid rgba(255,255,255,.45); border-radius: 6px; padding: 8px 10px; z-index: 9999; width: 140px; box-shadow: 0 4px 12px rgba(0,0,0,.5); }
.meta-popup label { font-size: 9px; font-weight: 600; color: rgba(255,255,255,.55); letter-spacing: .06em; text-transform: uppercase; display: block; margin-bottom: 3px; }
.meta-popup label:not(:first-child) { margin-top: 6px; }
.meta-popup input { width: 100%; height: 26px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.35); border-radius: 4px; color: #fff; font-size: 11px; font-weight: 500; font-family: 'DM Sans', sans-serif; text-align: center; padding: 0 6px; outline: none; }
.meta-popup input:focus { border-color: #fff; background: rgba(255,255,255,.2); }
.meta-popup input::placeholder { color: rgba(255,255,255,.3); }
.meta-popup-btns { display: flex; gap: 6px; margin-top: 8px; }
.meta-popup-btns button { flex: 1; height: 24px; border-radius: 4px; border: none; font-size: 10px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.meta-btn-ok { background: rgba(255,255,255,.25); color: #fff; }
.meta-btn-ok:hover { background: rgba(255,255,255,.4); }
.meta-btn-cancel { background: transparent; color: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.2) !important; }
.type-select { width: 140px; background: #1e3d24; border: 1.5px solid rgba(255,255,255,.5); border-radius: 5px; z-index: 200; overflow: hidden; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
.type-option { padding: 7px 10px; font-size: 12px; font-weight: 500; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .1s; }
.type-option:hover { background: rgba(255,255,255,.15); }
.opt-key { width: 18px; height: 18px; border-radius: 3px; background: rgba(255,255,255,.2); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.btn-plus { width: 28px; height: 28px; flex-shrink: 0; border: 1.5px dashed rgba(255,255,255,.5); border-radius: 4px; background: transparent; color: rgba(255,255,255,.85); font-size: 18px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all .15s; padding: 0; line-height: 1; }
.btn-plus:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,.12); }
.sort-label { font-size: 10px; color: rgba(255,255,255,.4); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; }
.sort-btn { height: 22px !important; padding: 0 9px !important; font-size: 10px !important; background: rgba(0,0,0,.2) !important; border-color: rgba(255,255,255,.25) !important; color: rgba(255,255,255,.7) !important; }
.sort-btn:hover { background: rgba(0,0,0,.35) !important; border-color: rgba(255,255,255,.5) !important; color: #fff !important; }
.sort-btn.active { background: rgba(0,0,0,.45) !important; border-color: rgba(255,255,255,.7) !important; color: #fff !important; }
.p-spacer { flex: 1; min-width: 8px; }
.p-avg { width: 84px; flex-shrink: 0; flex-grow: 0; text-align: right; }
.avg-val { font-size: 15px; font-weight: 700; color: #fff; display: block; }
.avg-rnds { font-size: 10px; color: rgba(255,255,255,.55); display: block; margin-top: 1px; }
.avg-empty { font-size: 14px; color: rgba(255,255,255,.3); }
.btn-del { width: 20px; height: 20px; flex-shrink: 0; border: none; background: none; color: rgba(255,255,255,.35); font-size: 15px; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; transition: color .15s; }
.btn-del:hover { color: rgba(255,100,100,.9); }
.badd { height: 32px; padding: 0 15px; border: 1.5px solid rgba(255,255,255,.4); border-radius: 6px; background: transparent; color: rgba(255,255,255,.85); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; }
.badd:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,.1); }
#toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.78); color: #fff; font-size: 13px; padding: 8px 20px; border-radius: 24px; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; font-family: 'DM Sans', sans-serif; z-index: 999; }
#toast.show { opacity: 1; }
.loading { text-align: center; padding: 40px; color: rgba(255,255,255,.5); font-size: 14px; }
.hdr-sort-row { display: none; align-items: center; gap: 6px; margin-top: 6px; }
.sort-label-mobile { font-size: 10px; color: rgba(255,255,255,.4); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; }
@media (max-width: 600px) {
  .hdr { padding: 12px 14px 10px; }
  .hdr-top { gap: 4px; }
  .title, .subtitle { font-size: 22px; }
  .hdr-row2 { gap: 5px; margin-top: 8px; }
  .abtn { height: 26px; padding: 0 8px; font-size: 10px; }
  .sort-desktop { display: none !important; }
  .sort-label-desktop { display: none; }
  .sort-pipe { display: none; }
  .hdr-sort-row { display: flex; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="title">Unsere Spielrundenergebnisse in 2026</div>
    <div class="subtitle">AK50 Damen GCBL</div>
  </div>
  <div class="hdr-row2">
    <span class="count" id="cnt">0 Teilnehmer</span>
    <span class="sync-status" id="syncStatus">● Verbinde…</span>
    <button class="abtn" onclick="saveAll()" id="btnSave">💾 Speichern</button>
    <button class="abtn" onclick="loadAll()" id="btnLoad">↩ Aktualisieren</button>
    <span class="sort-pipe" style="color:rgba(255,255,255,.2);font-size:11px">|</span>
    <span class="sort-label-desktop">Sortieren:</span>
    <button class="abtn sort-btn sort-desktop" id="sort-name" onclick="sortBy('name')">A–Z Name</button>
    <button class="abtn sort-btn sort-desktop" id="sort-avg" onclick="sortBy('avg')">Ø aufsteigend</button>
    <button class="abtn sort-btn sort-desktop" id="sort-count" onclick="sortBy('count')">Anzahl Runden</button>
  </div>
  <div class="hdr-sort-row">
    <span class="sort-label-mobile">Sortieren:</span>
    <button class="abtn sort-btn sort-mobile" onclick="sortBy('name')" id="sort-name-m">A–Z</button>
    <button class="abtn sort-btn sort-mobile" onclick="sortBy('avg')" id="sort-avg-m">Ø</button>
    <button class="abtn sort-btn sort-mobile" onclick="sortBy('count')" id="sort-count-m">#</button>
  </div>
</div>

<div class="col-hdr">
  <div class="ch" style="width:80px;flex-shrink:0;margin-right:10px">Name</div>
  <div class="ch" style="flex:1">Rundenergebnisse</div>
  <div class="ch" style="width:84px;text-align:right">Ø Schnitt</div>
  <div style="width:28px"></div>
</div>

<div id="rows"><div class="loading">Daten werden geladen…</div></div>

<div class="foot">
  <button class="badd" onclick="addPlayer()">+ Spieler hinzufügen</button>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://eutectwjiotunheltkbo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1dGVjdHdqaW90dW5oZWx0a2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDg5MjIsImV4cCI6MjA5MjE4NDkyMn0.rA1g8MaWyuZx2hAfFOdUZZ7EiSqBe0NI0HPOjb0I-7g';
const API = `${SUPABASE_URL}/rest/v1/spieler`;
const HDR = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Prefer': 'return=representation' };
const TYPES = [{ key: 'P', label: 'P – Privatrunde' }, { key: 'T', label: 'T – Turnier' }, { key: 'L', label: 'L – Ligaspiel' }];
const TC = { P: '#7ec8e3', T: '#f5c842', L: '#f4a0c0' };

let P = [];
let saveTimer = null;
let activeDd = null;
let activePopup = null;

async function dbLoad() {
  const r = await fetch(`${API}?order=created_at.asc`, { headers: HDR });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbUpsert(p) {
  const method = p.id ? 'PATCH' : 'POST';
  const url = p.id ? `${API}?id=eq.${p.id}` : API;
  const body = { name: p.name, scores: p.scores, score_types: p.score_types, score_dates: p.score_dates, score_courses: p.score_courses };
  const r = await fetch(url, { method, headers: HDR, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
  const d = await r.json();
  return Array.isArray(d) ? d[0] : d;
}
async function dbDelete(id) {
  const r = await fetch(`${API}?id=eq.${id}`, { method: 'DELETE', headers: HDR });
  if (!r.ok) throw new Error(await r.text());
}

function emptyPlayer() {
  return { id: null, name: '', scores: [], score_types: [], score_dates: [], score_courses: [] };
}
function padArrays(p) {
  const n = p.scores.length;
  while (p.score_types.length < n) p.score_types.push('');
  while (p.score_dates.length < n) p.score_dates.push('');
  while (p.score_courses.length < n) p.score_courses.push('');
}

async function loadAll() {
  setStatus('● Lade…', '');
  try {
    const rows = await dbLoad();
    P = rows.map(r => {
      const p = { id: r.id, name: r.name || '', scores: r.scores || [], score_types: r.score_types || [], score_dates: r.score_dates || [], score_courses: r.score_courses || [] };
      padArrays(p); return p;
    });
    while (P.length < 6) P.push(emptyPlayer());
    const named = P.filter(p => p.name.trim()), emp = P.filter(p => !p.name.trim());
    named.sort((a, b) => a.name.localeCompare(b.name, 'de'));
    P = [...named, ...emp];
    render(); setStatus('● Synchronisiert', 'ok');
  } catch (e) {
    setStatus('● Verbindungsfehler', 'err');
    showToast('Fehler: ' + e.message);
    P = Array.from({ length: 6 }, emptyPlayer);
    render();
  }
}

async function saveAll() {
  document.getElementById('btnSave').disabled = true;
  setStatus('● Speichert…', '');
  try {
    for (let i = 0; i < P.length; i++) {
      const p = P[i];
      if (!p.name.trim() && p.scores.length === 0 && !p.id) continue;
      const saved = await dbUpsert(p);
      if (saved?.id) P[i].id = saved.id;
    }
    setStatus('● Gespeichert ✓', 'ok'); showToast('Gespeichert ✓');
  } catch (e) { setStatus('● Fehler', 'err'); showToast('Fehler: ' + e.message); }
  document.getElementById('btnSave').disabled = false;
}

function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveAll, 2000); }

function addPlayer() {
  if (P.length >= 30) return;
  P.push(emptyPlayer()); render();
  setTimeout(() => { const a = document.querySelectorAll('.p-name'); a[a.length-1]?.focus(); }, 30);
}
async function remPlayer(i) {
  if (!confirm('Spieler "' + P[i].name + '" wirklich löschen?')) return;
  const p = P[i];
  if (p.id) { try { await dbDelete(p.id); } catch (e) { showToast('Fehler beim Löschen'); return; } }
  P.splice(i, 1); while (P.length < 6) P.push(emptyPlayer()); render();
}
function addScore(pi) {
  P[pi].scores.push(''); P[pi].score_types.push(''); P[pi].score_dates.push(''); P[pi].score_courses.push('');
  render(); setTimeout(() => { const a = document.querySelectorAll(`.sc-${pi}`); a[a.length-1]?.focus(); }, 30);
}
function delScore(pi, si) {
  ['scores','score_types','score_dates','score_courses'].forEach(k => P[pi][k].splice(si, 1));
  render(); scheduleSave();
}

function closeDd() { if (activeDd) { activeDd.remove(); activeDd = null; } }
function closePopup() { if (activePopup) { activePopup.remove(); activePopup = null; } }

function showTypeDd(pi, si, wrap) {
  closeDd();
  const dd = document.createElement('div'); dd.className = 'type-select';
  dd.style.position = 'fixed'; dd.style.zIndex = '9999';
  TYPES.forEach(t => {
    const opt = document.createElement('div'); opt.className = 'type-option';
    opt.innerHTML = `<span class="opt-key">${t.key}</span>${t.label}`;
    const selectType = e => {
      e.preventDefault();
      P[pi].score_types[si] = t.key;
      P[pi].score_dates[si] = ''; P[pi].score_courses[si] = '';
      closeDd(); render();
      setTimeout(() => {
        const w = document.querySelector(`.swrap-${pi}-${si}`);
        if (w) showMetaPopup(pi, si, w);
      }, 40);
      scheduleSave();
    };
    opt.onmousedown = selectType;
    opt.addEventListener('touchstart', selectType, {passive: false});
    dd.appendChild(opt);
  });
  document.body.appendChild(dd);
  const r = wrap.getBoundingClientRect();
  const ddH = 120;
  const top = window.innerHeight - r.bottom >= ddH + 10 ? r.bottom + 4 : r.top - ddH - 4;
  dd.style.top = Math.max(4, top) + 'px';
  dd.style.left = Math.max(4, Math.min(r.left, window.innerWidth - 148)) + 'px';
  activeDd = dd;
}

function showMetaPopup(pi, si, wrap) {
  closePopup();
  const popup = document.createElement('div'); popup.className = 'meta-popup';
  const mkLabel = t => { const l = document.createElement('label'); l.textContent = t; return l; };
  const mkInput = (ph, ml, val) => { const i = document.createElement('input'); i.type = 'text'; i.placeholder = ph; i.maxLength = ml; i.value = val || ''; return i; };
  const iDate = mkInput('TT.MM.JJ', 8, P[pi].score_dates[si]);
  iDate.oninput = e => e.target.value = e.target.value.replace(/[^0-9.]/g, '').substring(0, 8);
  const iCourse = mkInput('max. 10 Zeichen', 10, P[pi].score_courses[si]);
  popup.append(mkLabel('Datum'), iDate, mkLabel('Golfplatz'), iCourse);
  const btns = document.createElement('div'); btns.className = 'meta-popup-btns';
  const btnOk = document.createElement('button'); btnOk.className = 'meta-btn-ok'; btnOk.textContent = 'Speichern';
  btnOk.onclick = e => {
    e.stopPropagation();
    P[pi].score_dates[si] = iDate.value.trim(); P[pi].score_courses[si] = iCourse.value.trim();
    const tt = wrap.querySelector('.score-tooltip');
    if (tt) tt.innerHTML = buildTooltipHTML(P[pi].score_types[si]||'', P[pi].score_dates[si], P[pi].score_courses[si]);
    scheduleSave(); closePopup();
  };
  const btnCancel = document.createElement('button'); btnCancel.className = 'meta-btn-cancel'; btnCancel.textContent = 'Abbrechen';
  btnCancel.onclick = e => { e.stopPropagation(); closePopup(); };
  btns.append(btnOk, btnCancel); popup.appendChild(btns);
  popup.addEventListener('click', e => e.stopPropagation());
  document.body.appendChild(popup);
  const r = wrap.getBoundingClientRect();
  const popH = 130;
  const top = window.innerHeight - r.bottom >= popH + 10 ? r.bottom + 6 : r.top - popH - 6;
  popup.style.top = Math.max(4, top) + 'px';
  popup.style.left = Math.max(4, Math.min(r.left, window.innerWidth - 148)) + 'px';
  activePopup = popup; iDate.focus();
}

function buildTooltipHTML(bt, dateVal, courseVal) {
  const color = TC[bt] || 'rgba(255,255,255,.6)';
  const typeLabel = bt === 'P' ? 'Privatrunde' : bt === 'T' ? 'Turnier' : bt === 'L' ? 'Ligaspiel' : '';
  let html = '';
  if (typeLabel) html += `<span style="color:${color};font-weight:700">${typeLabel}</span>`;
  if (dateVal) html += `${html ? '<br>' : ''}<span style="color:rgba(255,255,255,.8)">${dateVal}</span>`;
  if (courseVal) html += `${html ? '<br>' : ''}<span style="color:rgba(255,255,255,.8)">${courseVal}</span>`;
  if (!html) html = '<span style="color:rgba(255,255,255,.3)">Keine Details</span>';
  return html;
}

document.addEventListener('click', () => { closeDd(); closePopup(); });

function calcAvg(sc) { const v = sc.map(x => parseFloat(x)).filter(x => !isNaN(x) && isFinite(x)); return v.length ? v.reduce((a,b) => a+b, 0) / v.length : null; }
function fmt(a) { return a === null ? null : Number.isInteger(a) ? '' + a : a.toFixed(2); }
function updateCount() { document.getElementById('cnt').textContent = P.filter(p => p.name.trim()).length + ' Teilnehmer'; }
function setStatus(msg, cls) { const el = document.getElementById('syncStatus'); el.textContent = msg; el.className = 'sync-status ' + cls; }
function refreshAvg(pi) {
  const aw = document.querySelector(`.avg-cell[data-pi="${pi}"]`); if (!aw) return;
  const a = calcAvg(P[pi].scores), cnt = P[pi].scores.filter(s => s !== '').length;
  aw.innerHTML = a !== null ? `<span class="avg-val">${fmt(a)}</span><span class="avg-rnds">${cnt} Runde${cnt !== 1 ? 'n' : ''}</span>` : `<span class="avg-empty">—</span>`;
}

let currentSort = null;
function sortBy(mode) {
  if (currentSort === mode) { currentSort = null; document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); loadAll(); return; }
  currentSort = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + mode)?.classList.add('active');
  document.getElementById('sort-' + mode + '-m')?.classList.add('active');
  const named = P.filter(p => p.name.trim()), empty = P.filter(p => !p.name.trim());
  if (mode === 'name') named.sort((a, b) => a.name.localeCompare(b.name, 'de'));
  else if (mode === 'avg') named.sort((a, b) => { const aa = calcAvg(a.scores), ba = calcAvg(b.scores); if (aa === null && ba === null) return 0; if (aa === null) return 1; if (ba === null) return -1; return aa - ba; });
  else if (mode === 'count') named.sort((a, b) => b.scores.filter(s => s !== '').length - a.scores.filter(s => s !== '').length);
  P = [...named, ...empty]; render();
}

function render() {
  const cont = document.getElementById('rows'); cont.innerHTML = ''; updateCount();
  P.forEach((p, pi) => {
    const row = document.createElement('div'); row.className = 'prow ' + (pi % 2 === 0 ? 'r1' : 'r2');
    const nr = document.createElement('div'); nr.className = 'p-nr'; nr.textContent = String(pi+1).padStart(2,'0'); row.appendChild(nr);
    const ni = document.createElement('input'); ni.type = 'text'; ni.className = 'p-name'; ni.placeholder = 'Name…'; ni.value = p.name; ni.maxLength = 8;
    ni.oninput = e => { P[pi].name = e.target.value; updateCount(); scheduleSave(); }; row.appendChild(ni);
    const sc = document.createElement('div'); sc.className = 'scores'; sc.addEventListener('click', e => e.stopPropagation());
    p.scores.forEach((s, si) => {
      const wrap = document.createElement('div'); wrap.className = `score-wrap swrap-${pi}-${si}`;
      wrap.onclick = e => e.stopPropagation();
      const inp = document.createElement('input'); inp.type = 'number'; inp.className = `sbox sc-${pi}`; inp.placeholder = '···';
      if (s !== '') inp.value = s;
      inp.oninput = e => {
        let v = e.target.value; const neg = v.startsWith('-'), digits = v.replace(/[^0-9]/g,'');
        if (digits.length > 3) e.target.value = v = (neg ? '-' : '') + digits.slice(0,3);
        P[pi].scores[si] = e.target.value; refreshAvg(pi); scheduleSave();
      };
      inp.onblur = () => { if (P[pi].scores[si] !== '' && !P[pi].score_types[si]) setTimeout(() => showTypeDd(pi, si, wrap), 80); };
      inp.addEventListener('click', e => { if (P[pi].score_types[si]) { e.stopPropagation(); setTimeout(() => showMetaPopup(pi, si, wrap), 50); } });
      inp.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); inp.blur(); } };
      wrap.appendChild(inp);
      const bt = p.score_types[si] || '';
      const badge = document.createElement('span'); badge.className = `type-badge tbadge-${pi}-${si}` + (bt ? ` tb-${bt}` : ''); badge.textContent = bt; badge.title = 'Typ ändern';
      badge.onclick = e => { e.stopPropagation(); showTypeDd(pi, si, wrap); }; wrap.appendChild(badge);
      const tt = document.createElement('div'); tt.className = 'score-tooltip'; tt.innerHTML = buildTooltipHTML(bt, p.score_dates[si]||'', p.score_courses[si]||'');
      tt.addEventListener('mousedown', e => { e.stopPropagation(); showMetaPopup(pi, si, wrap); }); wrap.appendChild(tt);
      const sdel = document.createElement('span'); sdel.className = 'sdel'; sdel.textContent = '×'; sdel.title = 'Feld löschen';
      sdel.onclick = e => { e.stopPropagation(); delScore(pi, si); }; wrap.appendChild(sdel);
      sc.appendChild(wrap);
    });
    const bp = document.createElement('button'); bp.className = 'btn-plus'; bp.textContent = '+'; bp.onclick = () => addScore(pi); sc.appendChild(bp);
    row.appendChild(sc);
    const aw = document.createElement('div'); aw.className = 'p-avg avg-cell'; aw.dataset.pi = pi;
    const a = calcAvg(p.scores), cnt = p.scores.filter(s => s !== '').length;
    aw.innerHTML = a !== null ? `<span class="avg-val">${fmt(a)}</span><span class="avg-rnds">${cnt} Runde${cnt !== 1 ? 'n' : ''}</span>` : `<span class="avg-empty">—</span>`;
    row.appendChild(aw);
    const db = document.createElement('button'); db.className = 'btn-del'; db.textContent = '✕'; db.onclick = () => remPlayer(pi); row.appendChild(db);
    cont.appendChild(row);
  });
}

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

loadAll();
</script>
</body>
</html>
